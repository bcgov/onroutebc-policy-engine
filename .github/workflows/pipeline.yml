---
name: CI/CD Pipleine For Simple Package Publishing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

  semver:
    runs-on: ubuntu-24.04

    outputs:
      next-version: ${{ steps.semver.outputs.next }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: main
          noNewCommitBehavior: warn
          noVersionBumpBehavior: warn

      - name: Log if No Version Bump
        if: ${{ !steps.semver.outputs.next }}
        run: echo "No version bump detected. Skipping deploy."

  deploy:
    needs: semver

    if: ${{ needs.semver.outputs.next-version }}

    runs-on: ubuntu-24.04

    permissions:
      id-token: write # needed for provenance data generation
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Injecting Semver Into Package.json
        run: |
          npm version "${{ needs.semver.outputs.next-version }}" --no-git-tag-version

      - name: Fix package.json
        run: npm pkg fix

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm install genversion --save-dev

      - run: npx genversion -e src/version.ts

      - run: npm run build

      - run: npm test

      - name: Publish Package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.semver.outputs.next-version }}" \
          --repo="${{ github.repository }}" \
          --title="${{ needs.semver.outputs.next-version }}" \
          --generate-notes
